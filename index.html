<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกและคัดกรองสุขภาพประจำวัน ทหารใหม่ - ร.2 พัน.2 รอ.</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f1f5f9; 
            padding: 0.5rem;
        }

        /* 🎯 ธีมประจำหน่วย: พื้นหลังม่วงเข้มรักษาพระองค์ ตัดขอบเส้นหนาสีเขียวพิธีการ */
        .app-container {
            background-color: #2b113a; 
            border: 3px solid #155e3b; 
            padding: 1rem;
            border-radius: 1.25rem;
        }

        /* 🏆 กล่องกรอบทองคำอธิบายด้านบนขวา */
        .gold-border-box {
            background-color: #fffdf2; 
            border: 2px solid #d4af37;  
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.15); 
        }

        .bg-urine-section { background-color: rgba(254, 243, 199, 0.5); }
        .bg-temp-section { background-color: rgba(219, 234, 254, 0.5); }

        input:focus, select:focus {
            outline: none;
            border-color: #6b21a8 !important;
            box-shadow: 0 0 0 3px rgba(107, 33, 168, 0.3);
        }

        .btn-edit-mode {
            background-color: #d4af37 !important;
            color: #2b113a !important;
            border: 1px solid #b89324 !important;
        }
        .btn-edit-mode:hover {
            background-color: #b89324 !important;
        }

        /* ระบบกะพริบแจ้งเตือนสีแดงอัตโนมัติเมื่อตรวจพบทหารกลุ่มเสี่ยงฮีทสโตรก */
        .row-danger-alert {
            background-color: #fef2f2 !important; 
            animation: gentle-flash 2s infinite alternate;
        }
        @keyframes gentle-flash {
            from { background-color: #fef2f2; }
            to { background-color: #fee2e2; }
        }
    </style>
</head>
<body>

<div class="max-w-7xl mx-auto app-container shadow-2xl my-2">
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-3 mb-4 items-stretch text-xs">
        
        <header class="lg:col-span-2 bg-white p-3 rounded-xl border border-gray-100 flex items-center gap-3">
            <div class="w-12 h-12 shrink-0 overflow-hidden flex items-center justify-center">
                <img src="https://i.ibb.co/2rKmPhv/2-2.png" id="appLogo" alt="Logo" class="w-full h-full object-contain">
            </div>
            <div class="grow text-left">
                <h1 class="text-base font-bold text-purple-900 leading-tight">
                    🩺 ระบบบันทึกและคัดกรองสุขภาพทหารใหม่
                </h1>
                <p class="text-[11px] text-gray-500 font-medium">ร.2 พัน.2 รอ. • งานแพทย์และเฝ้าระวังภาวะวิกฤตฮีทสโตรก</p>
            </div>
        </header>

        <div class="lg:col-span-1 gold-border-box p-2 rounded-xl flex items-center justify-between gap-2 bg-amber-50/20">
            <div class="flex-1 text-center border-r border-amber-200/60 pr-1">
                <img src="https://i.ibb.co/4wntrrj3/202605192005.jpg" id="infoChart" alt="Manual Chart" class="mx-auto w-full h-14 bg-transparent object-contain p-0">
                <span class="text-[9px] font-bold text-amber-800 block mt-0.5">📝 เกณฑ์คัดกรอง</span>
            </div>
            <div class="w-16 shrink-0 text-center">
                <img src="https://i.ibb.co/xSH9rX5Q/Qr-App.png" id="infoQRCode" alt="App QR Code" class="mx-auto w-10 h-10 border border-amber-200 rounded-md bg-white object-contain p-0.5 shadow-2xs">
                <span class="text-[9px] font-bold text-amber-800 block mt-0.5">📲 QR แอป</span>
            </div>
        </div>

    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
        
        <section class="xl:col-span-1 bg-white p-4 rounded-xl shadow-xs border border-gray-100 h-fit space-y-3">
            <div class="flex items-center justify-between border-b border-gray-100 pb-1.5">
                <div class="flex items-center gap-1.5">
                    <span class="text-base">📋</span>
                    <h2 id="formTitle" class="text-sm font-bold text-gray-700">แบบฟอร์มบันทึกข้อมูล</h2>
                </div>
                <button type="button" id="btnCancelEdit" class="hidden text-[11px] bg-gray-500 hover:bg-gray-600 text-white px-2 py-0.5 rounded transition cursor-pointer">ยกเลิกแก้ไข</button>
            </div>
            
            <form id="recordForm" class="space-y-3 text-xs">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                    <div class="sm:col-span-1 grid grid-cols-2 sm:grid-cols-1 gap-2">
                        <div>
                            <label class="block text-[11px] font-medium text-gray-600 mb-0.5">วันที่ตรวจ</label>
                            <input type="date" id="inputDate" required class="w-full px-2 py-1 text-xs border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-purple-900 mb-0.5">⏱️ รอบเวลา</label>
                            <select id="inputTime" required class="w-full px-2 py-1 text-xs border border-purple-300 rounded-md bg-white font-semibold text-purple-950">
                                <option value="">-- เลือกรอบ --</option>
                                <option value="เช้า">🌅 เช้า</option>
                                <option value="กลางวัน">☀️ กลางวัน</option>
                                <option value="เย็น">🌆 เย็น</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="sm:col-span-2 grid grid-cols-2 gap-2 sm:grid-cols-1">
                        <div>
                            <label class="block text-[11px] font-medium text-gray-600 mb-0.5">หมวด</label>
                            <select id="inputCategory" required class="w-full px-2 py-1 text-xs border border-gray-300 rounded-md bg-white">
                                <option value="">-- เลือกหมวด --</option>
                                <option value="หมวด 1">หมวด 1</option>
                                <option value="หมวด 2">หมวด 2</option>
                                <option value="หมวด 3">หมวด 3</option>
                                <option value="หมวด 4">หมวด 4</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-gray-600 mb-0.5">หมู่</label>
                            <select id="inputGroup" class="w-full px-2 py-1 text-xs border border-gray-300 rounded-md bg-white">
                                <option value="-">-- เลือกหมู่ --</option>
                                <option value="หมู่ 1">หมู่ 1</option>
                                <option value="หมู่ 2">หมู่ 2</option>
                                <option value="หมู่ 3">หมู่ 3</option>
                                <option value="หมู่ 4">หมู่ 4</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="bg-urine-section p-2 rounded-lg border border-amber-100 space-y-1.5">
                    <span class="text-[11px] font-bold text-amber-800 block">🥛 คัดกรอง: จำนวนคนแยกตามสีปัสสาวะ</span>
                    <div class="grid grid-cols-5 gap-1.5">
                        <div class="text-center">
                            <label class="block text-[10px] text-gray-500 mb-0.5">สี 0</label>
                            <input type="number" id="urine0" min="0" value="0" required class="w-full text-center p-1 border border-gray-300 rounded-md bg-white">
                        </div>
                        <div class="text-center">
                            <label class="block text-[10px] text-gray-500 mb-0.5">สี 1</label>
                            <input type="number" id="urine1" min="0" value="0" required class="w-full text-center p-1 border border-gray-300 rounded-md bg-white">
                        </div>
                        <div class="text-center">
                            <label class="block text-[10px] text-gray-500 mb-0.5">สี 2</label>
                            <input type="number" id="urine2" min="0" value="0" required class="w-full text-center p-1 border border-gray-300 rounded-md bg-white">
                        </div>
                        <div class="text-center">
                            <label class="block text-[10px] font-bold text-amber-700 mb-0.5">สี 3</label>
                            <input type="number" id="urine3" min="0" value="0" required class="w-full text-center p-1 border border-gray-300 rounded-md bg-white font-bold text-amber-700">
                        </div>
                        <div class="text-center">
                            <label class="block text-[10px] font-bold text-red-600 mb-0.5">สี 4</label>
                            <input type="number" id="urine4" min="0" value="0" required class="w-full text-center p-1 border border-gray-300 rounded-md bg-white font-bold text-red-600">
                        </div>
                    </div>
                </div>

                <div class="bg-temp-section p-2 rounded-lg border border-blue-100 space-y-1.5">
                    <span class="text-[11px] font-bold text-blue-800 block">🌡️ คัดกรอง: จำนวนคนแยกตามอุณหภูมิร่างกาย</span>
                    <div class="space-y-1 text-[11px]">
                        <div class="flex items-center justify-between gap-2">
                            <label class="text-gray-600">ต่ำกว่า 36.8 °C (ปกติ)</label>
                            <input type="number" id="tempLow" min="0" value="0" required class="w-20 text-center p-0.5 border border-gray-300 rounded-md bg-white">
                        </div>
                        <div class="flex items-center justify-between gap-2">
                            <label class="text-gray-600">36.8 - 37.2 °C (เริ่มอุ่น)</label>
                            <input type="number" id="tempNormal" min="0" value="0" required class="w-20 text-center p-0.5 border border-gray-300 rounded-md bg-white">
                        </div>
                        <div class="flex items-center justify-between gap-2 font-bold text-red-600">
                            <label>มากกว่า 37.2 °C (⚠️ เสี่ยงเฝ้าระวัง)</label>
                            <input type="number" id="tempHigh" min="0" value="0" required class="w-20 text-center p-0.5 border border-red-300 rounded-md bg-red-50 text-red-700 font-bold">
                        </div>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-purple-800 hover:bg-purple-900 text-white font-bold py-2 px-4 rounded-md transition shadow-xs tracking-wide cursor-pointer">
                    💾 บันทึกข้อมูลสถิติ
                </button>
            </form>
            
            <div class="text-center pt-1.5 border-t border-gray-100">
                <span class="text-[9px] font-medium text-purple-400 tracking-wider">🎖️ จัดทำโดย บก.ทหารใหม่ ผลัด 1/69</span>
            </div>
        </section>

        <section id="tableContainer" class="xl:col-span-2 bg-white p-4 rounded-xl shadow-xs border border-gray-100 space-y-3">
            <div class="flex items-center gap-1.5 border-b border-gray-100 pb-1.5">
                <span class="text-base">🔍</span>
                <h2 class="text-sm font-bold text-gray-700">ค้นหาข้อมูลสถิติ</h2>
            </div>

            <div class="bg-gray-50 p-3 rounded-lg grid grid-cols-2 md:grid-cols-5 gap-2 items-end text-[11px]">
